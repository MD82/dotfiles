add_newline = false
scan_timeout = 100
format = """
$username$hostname$directory$git_branch$git_status$nodejs$java$status
$character"""

# в”Җв”Җ мӮ¬мҡ©мһҗ / нҳёмҠӨнҠё в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[username]
show_always = true
format = "[$user]($style)"
style_user = "bold #7aa2f7"
style_root = "bold red"

[hostname]
ssh_only = true
format = "[@$hostname]($style) "
style = "#9ece6a"
trim_at = "."

# в”Җв”Җ кІҪлЎң в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[directory]
truncation_length = 3
truncate_to_repo = false
format = "[ in ]($style)[$path]($style)[$read_only]($read_only_style) "
style = "bold #e0af68"
read_only = " у°Ңҫ"
read_only_style = "#f7768e"

# в”Җв”Җ Git в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[git_branch]
symbol = ""
format = "[on ]($style)[$symbol$branch]($style)"
style = "#bb9af7"

[git_status]
format = '([ \[$staged$modified$deleted$untracked$stashed$conflicted$renamed$ahead_behind\]]($style)) '
style = "#f7768e"
conflicted = "вҡЎ${count}"
ahead = "вҶ‘${count}"
behind = "вҶ“${count}"
diverged = "вҶ•"
untracked = "?${count}"
stashed = "вүЎ${count}"
modified = "Вұ${count}"
staged = "вӢҜ${count}"
deleted = "вңҳ${count}"
renamed = "В»${count}"

# в”Җв”Җ Python в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# [python]
# disabled = true
# symbol = " "
# format = '[${symbol}${pyenv_prefix}${version}(\($virtualenv\))]($style) '
# style = "#e0af68"
# detect_files = ["requirements.txt", "pyproject.toml", ".python-version", "*.py"]

# в”Җв”Җ Node.js / TypeScript в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[nodejs]
symbol = "в¬ў "
format = "[$symbol$version]($style) "
style = "#9ece6a"
detect_files = ["package.json", ".node-version"]

# в”Җв”Җ Java в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[java]
symbol = " "
format = "[$symbol$version]($style) "
style = "#f7768e"
detect_files = ["pom.xml", "build.gradle"]

# в”Җв”Җ SSH н‘ңмӢң (SSH м ‘мҶҚ мӢңм—җл§Ң мһҗлҸҷ н‘ңмӢң) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# username + hostnameмқҙ мқҙлҜё н‘ңмӢңлҗҳлҜҖлЎң лі„лҸ„ лӘЁл“Ҳ л¶Ҳн•„мҡ”
# SSH м—¬л¶ҖлҠ” hostname.ssh_only = true/false лЎң м ңм–ҙ

# в”Җв”Җ мӢӨн–ү кІ°кіј / м»Өм„ң в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[status]
disabled = false
format = "[$symbol$status]($style) "
map_symbol = true
not_found_symbol = "nf "
not_executable_symbol = "noexec "
sigint_symbol = "^C "
symbol = "вңҳ "
style = "bold #f7768e"

[character]
success_symbol = "[вқҜ](bold #9ece6a) "
error_symbol   = "[вқҜ](bold #f7768e) "
