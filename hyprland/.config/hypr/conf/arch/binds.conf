bind = $mainMod, T, exec, $terminal
bind = $mainMod, W, exec, firefox --private-window
bind = $mainMod, backslash, layoutmsg, togglesplit # dwindle
bind = , XF86LaunchA, exec, fuzzel
bind = , XF86LaunchB, togglespecialworkspace, magic
bind = SUPER SHIFT, ESCAPE, exec, hyprctl dispatch exit
bind = CTRL $mainMod, L, exec, hyprctl dispatch dpms off
bind = CTRL $mainMod, O, exec, hyprctl dispatch dpms on
bind = CTRL $mainMod ALT, R, exec, hyprctl reload
bindl = CTRL $mainMod, SPACE, exec, playerctl play-pause
bindl = , switch:on:Lid Switch, exec, /home/md82/.local/bin/lid-screen-policy close
bindl = , switch:off:Lid Switch, exec, /home/md82/.local/bin/lid-screen-policy open
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, ~/.config/hypr/scripts/volume-notify up
bindel = ,XF86AudioLowerVolume, exec, ~/.config/hypr/scripts/volume-notify down
bindel = ,XF86AudioMute, exec, ~/.config/hypr/scripts/volume-notify mute
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, ~/.config/hypr/scripts/backlight-notify mon_up
bindel = ,XF86MonBrightnessDown, exec, ~/.config/hypr/scripts/backlight-notify mon_down
bindel = ,XF86KbdBrightnessUp, exec, ~/.config/hypr/scripts/backlight-notify kbd_up
bindel = ,XF86KbdBrightnessDown, exec, ~/.config/hypr/scripts/backlight-notify kbd_down

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
