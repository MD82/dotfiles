general {
  no_fade_in = false
  grace = 0
  disable_loading_bar = false
}

background {
  monitor =
  path = ~/.config/hypr/hyprlock/hypr.png
  blur_passes = 0
  contrast = 0.8916
  brightness = 0.8172
  vibrancy = 0.1696
  vibrancy_darkness = 0.0
}

label {
  monitor =
  text = cmd[update:1000] echo "<span>$(date +\"%I:%M\")</span>"
  color = rgba(236, 240, 245, 0.78)
  font_size = 160
  position = 0, 190
  halign = center
  valign = center
}

label {
  monitor =
  text = cmd[update:60000] echo "$(date +'%A, %B %d')"
  color = rgba(236, 240, 245, 0.72)
  font_size = 26
  position = 0, 290
  halign = center
  valign = center
}

label {
  monitor =
  text = $USER
  color = rgba(236, 240, 245, 0.85)
  font_size = 20
  position = 0, -140
  halign = center
  valign = center
}

image {
  monitor =
  path = ~/.config/hypr/hyprlock/foreground.png
  size = 700
  border_size = 0
  rounding = 0
  rotate = 0
  reload_time = 0
  reload_cmd =
  position = 0, -66
  halign = center
  valign = center
}

input-field {
  monitor =
  size = 300, 60
  outline_thickness = 2
  dots_size = 0.2
  dots_spacing = 0.2
  dots_center = true
  outer_color = rgba(255, 255, 255, 0.0)
  inner_color = rgba(255, 255, 255, 0.14)
  check_color = rgba(154, 206, 144, 0.9)
  fail_color = rgba(215, 110, 110, 0.9)
  font_color = rgb(235, 240, 245)
  fade_on_empty = false
  placeholder_text = Enter Pass
  hide_input = false
  position = 0, -210
  halign = center
  valign = center
}
