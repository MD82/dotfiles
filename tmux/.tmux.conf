set -g mouse on
set -g mode-keys vi
set -s escape-time 10

bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi Enter send-keys -X copy-selection-and-cancel

# 클립보드: OS별 자동 감지
if-shell "grep -qi microsoft /proc/version 2>/dev/null" \
  "bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'clip.exe'" \
  "if-shell 'uname | grep -q Darwin' \
    'bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel pbcopy' \
    'bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel wl-copy'"

# prefix 키를 C-a 로 변경
set -g prefix 'C-a'
set -g status-left "#H"
unbind C-b

# 직관적인 분할 단축키
bind | split-window -h -c "#{pane_current_path}"   # 세로 분할 (| 모양)
bind - split-window -v -c "#{pane_current_path}"   # 가로 분할 (- 모양)
unbind '"'
unbind %

# 창 간 이동: Alt + 화살표 (prefix 없이)
bind -r Left  select-pane -L
bind -r Right select-pane -R
bind -r Up    select-pane -U
bind -r Down  select-pane -D

# 창 크기 조절: prefix + Shift + 화살표
bind -r S-Left  resize-pane -L 5
bind -r S-Right resize-pane -R 5
bind -r S-Up    resize-pane -U 5
bind -r S-Down  resize-pane -D 5

# 탭(window) 이동: Shift + 화살표 (prefix 없이)
#bind -r S-Left  previous-window
#bind -r S-Right next-window

# 새 탭: prefix + c (기본값 유지), 탭 이름 변경: prefix + ,
# 탭 닫기: prefix + Q  /  pane 닫기: prefix + x
unbind &
bind x confirm-before -p "kill pane #P? (y/n)" kill-pane
bind Q confirm-before -p "kill window #S:#W? (y/n)" kill-window

# 설정 리로드: prefix + r
bind r source-file ~/.tmux.conf \; display "tmux.conf reloaded!"

# nested tmux: send local prefix to remote
bind-key -n C-b send-prefix  # prefix + C-a 로 현재 prefix(C-a)를 원격 tmux로 전달
