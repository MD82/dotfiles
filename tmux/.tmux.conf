set -g mouse off
set -g mode-keys vi
# Keep enough time for terminal query responses (DA/OSC) to be parsed as escape
# sequences instead of leaking into the shell on WSL/Windows Terminal.
set -s escape-time 200

# WSL2/터미널 capability 쿼리 응답이 프롬프트에 섞이지 않도록
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# WSL2: DA2 쿼리 응답(61;4;...c)이 셸로 새는 현상 방지
# Windows Terminal 응답이 셸 stdin으로 흘러드는 타이밍 문제 — WSL2 전용
if-shell "grep -Eqi 'microsoft|wsl' /proc/sys/kernel/osrelease 2>/dev/null" \
  "set -g focus-events off" \
  "set -g focus-events on"

bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi Enter send-keys -X copy-selection-and-cancel

# 클립보드: OS별 자동 감지
if-shell "grep -Eqi 'microsoft|wsl' /proc/sys/kernel/osrelease 2>/dev/null" \
  "bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'clip.exe'" \
  "if-shell 'uname | grep -q Darwin' \
    'bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel pbcopy' \
    'bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel wl-copy'"

# prefix 키를 C-a 로 변경
set -g prefix 'C-a'
set -g status-left "[#S] "
set -g status-left-length 30
set -g status-right "#H"
set -g status-right-length 30
set -g base-index 1
set -g pane-base-index 1
unbind C-b

# 활성 pane 테두리 강조
set -g pane-active-border-style fg=#a6e3a1
set -g pane-border-style fg=#45475a

# 직관적인 분할 단축키
bind "|" split-window -h -c "#{pane_current_path}"   # 세로 분할 (| 모양)
bind "-" split-window -v -c "#{pane_current_path}"   # 가로 분할 (- 모양)
unbind '"'
unbind %

# 창 간 이동: prefix + 화살표
bind -r Left  select-pane -L
bind -r Right select-pane -R
bind -r Up    select-pane -U
bind -r Down  select-pane -D

# 창 크기 조절: prefix + Shift + 화살표
bind -r S-Left  resize-pane -L 5
bind -r S-Right resize-pane -R 5
bind -r S-Up    resize-pane -U 5
bind -r S-Down  resize-pane -D 5

# 탭(window) 이동: prefix + Shift + 화살표
#bind -r S-Left  previous-window
#bind -r S-Right next-window
# 새 탭: prefix + c (기본값 유지), 탭 이름 변경: prefix + ,
# 탭 닫기: prefix + Q  /  pane 닫기: prefix + x
unbind &
bind x confirm-before -p "kill pane #P? (y/n)" kill-pane
bind Q confirm-before -p "kill window #S:#W? (y/n)" kill-window

# 설정 리로드: prefix + r
bind r source-file ~/.tmux.conf \; display "tmux.conf reloaded!"

# 마우스 토글: prefix + m (ON) / prefix + M (OFF)
bind m set -g mouse on \; display "Mouse ON"
bind M set -g mouse off \; display "Mouse OFF"

# nested tmux: send prefix to remote without stealing raw C-b from applications
bind-key C-b send-prefix

# macOS: TokyoNight / 그 외(Linux/WSL): Solarized Light
if-shell 'uname | grep -q Darwin' \
  'set -g status-style                bg=#16161e,fg=#c0caf5; \
   set -g status-left-style           bg=#7aa2f7,fg=#1a1b26,bold; \
   set -g status-right-style          bg=#16161e,fg=#a9b1d6; \
   set -g window-status-style         bg=#16161e,fg=#565f89; \
   set -g window-status-current-style bg=#7aa2f7,fg=#1a1b26,bold; \
   set -g pane-border-style           fg=#292e42; \
   set -g pane-active-border-style    fg=#bb9af7; \
   set -g message-style               bg=#292e42,fg=#c0caf5' \
  'set -g status-style                bg=#eee8d5,fg=#657b83; \
   set -g status-left-style           bg=#eee8d5,fg=#586e75; \
   set -g status-right-style          bg=#eee8d5,fg=#586e75; \
   set -g window-status-style         bg=#eee8d5,fg=#839496; \
   set -g window-status-current-style bg=#eee8d5,fg=#268bd2,bold; \
   set -g pane-border-style           fg=#eee8d5; \
   set -g pane-active-border-style    fg=#cb4b16; \
   set -g message-style               bg=#eee8d5,fg=#cb4b16'
